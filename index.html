<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technetium - Leadgen Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7fa;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --dim:#94a3b8;
  --brand:#0b5e8e;
  --brand-hover:#094c74;
  --brand-soft:#e6f1f8;
  --review:#7c3aed;
  --review-soft:#f5f3ff;
  --ok:#047857;
  --ok-soft:#ecfdf5;
  --warn:#b45309;
  --warn-soft:#fffbeb;
  --danger:#b91c1c;
  --danger-soft:#fef2f2;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.loader{display:flex;justify-content:center;align-items:center;height:100vh}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.title{font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.subtitle{font-size:12px;color:var(--muted);font-weight:400}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live-indicator{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;background:var(--ok-soft);border-radius:20px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}
.live-text{font-size:12px;font-weight:500;color:#166534;font-family:'DM Mono',monospace}
.refresh-btn{padding:6px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.refresh-btn:hover{background:#f1f5f9;color:var(--text)}
.sync-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
.sync-ok{background:var(--ok-soft);color:#166534}
.sync-off{background:#f1f5f9;color:#475569}
.sync-err{background:var(--danger-soft);color:#991b1b}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--border)}
.stat{padding:14px;background:#f8fafc;border:1px solid var(--border);border-radius:10px;animation:fadeIn .4s ease both}
.stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.stat-nieuw .stat-value{color:var(--muted)}
.stat-review .stat-value{color:var(--review)}
.stat-verzenden .stat-value{color:var(--warn)}
.stat-afgewezen .stat-value{color:var(--danger)}
.toolbar{display:flex;gap:10px;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.filter-btn:hover{background:#f1f5f9}
.filter-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.filter-btn .count{font-family:'DM Mono',monospace;font-size:11px;opacity:.75}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px;margin-left:auto}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.search-input{width:100%;padding:8px 12px 8px 32px;font-size:13px;border:1px solid var(--border);border-radius:6px;font-family:inherit;color:var(--text);background:#f8fafc;outline:none}
.search-input:focus{border-color:var(--brand);background:#fff}
.content{padding:16px 24px 40px}
.list{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.03)}
.list-header{display:grid;grid-template-columns:110px 1.6fr 2.2fr 1.4fr 150px 40px;gap:12px;padding:10px 16px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:#fafbfc}
.lead-row{display:grid;grid-template-columns:110px 1.6fr 2.2fr 1.4fr 150px 40px;gap:12px;padding:12px 16px;border-bottom:1px solid #f1f5f9;align-items:center;font-size:13px;animation:fadeIn .3s ease both;transition:background .12s;cursor:pointer}
.lead-row:hover{background:#f8fafc}
.lead-row:last-child{border-bottom:none}
.date-mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.name{font-weight:600;color:var(--text)}
.headline{color:var(--muted);font-size:12px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.city{color:var(--muted);font-size:12px}
.arrow{color:var(--dim);text-align:right;font-family:'DM Mono',monospace;font-size:14px}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap;font-family:'DM Mono',monospace}
.st-nieuw{background:#f1f5f9;color:var(--muted)}
.st-review{background:var(--review-soft);color:var(--review)}
.st-verzenden{background:var(--warn-soft);color:var(--warn)}
.st-afgewezen{background:var(--danger-soft);color:var(--danger)}
.empty-state{padding:60px 20px;text-align:center;color:var(--dim)}
.empty-state h3{font-size:15px;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:13px}
.footer{padding:12px 24px;font-size:11px;color:var(--dim);text-align:right;font-family:'DM Mono',monospace}
.card-view{display:none}
.busy{opacity:.5;pointer-events:none}

/* Panel */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(4px);z-index:1000;display:none;justify-content:flex-end}
.overlay.open{display:flex;animation:fadeIn .18s ease both}
.panel{width:520px;max-width:92vw;background:var(--card);height:100%;overflow-y:auto;display:flex;flex-direction:column;animation:slideIn .22s ease;box-shadow:-8px 0 30px rgba(0,0,0,.1)}
.panel-header{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 24px 18px;border-bottom:1px solid var(--border);gap:12px}
.panel-title-block{flex:1;min-width:0}
.panel-name{font-size:20px;font-weight:700;color:var(--text);line-height:1.25}
.panel-sub{font-size:13px;color:var(--muted);margin-top:4px}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:inherit;flex-shrink:0}
.close-btn:hover{background:#f1f5f9;color:var(--text)}
.panel-body{padding:20px 24px;flex:1;overflow-y:auto}
.panel-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.meta-item{display:flex;flex-direction:column;gap:4px;padding:10px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:8px}
.meta-label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.meta-value{font-size:13px;color:var(--text);font-weight:500;word-break:break-word}
.panel-section{margin-bottom:18px}
.panel-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.message-box{padding:14px 16px;background:#f8fafc;border-radius:8px;font-size:13px;line-height:1.55;color:var(--text);border:1px solid var(--border);white-space:pre-wrap;word-break:break-word}
.message-box.empty{color:var(--dim);font-style:italic}
.panel-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--brand);text-decoration:none;padding:8px 12px;background:var(--brand-soft);border-radius:6px;font-weight:500}
.panel-link:hover{background:#d0e5f1}
.panel-actions{padding:16px 24px;border-top:1px solid var(--border);background:#fff;position:sticky;bottom:0;display:grid;gap:8px}
.panel-actions.two-btn{grid-template-columns:1fr 1fr}
.btn{padding:12px 18px;font-size:14px;font-weight:600;border-radius:8px;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-accept{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-accept:hover{background:#036247}
.btn-reject{background:#fff;color:var(--danger);border-color:var(--danger)}
.btn-reject:hover{background:var(--danger-soft)}
.btn-reset{background:#fff;color:var(--muted);border-color:var(--border);font-size:13px;padding:10px}
.btn-reset:hover{background:#f1f5f9;color:var(--text)}
.panel-note{padding:12px 16px;background:var(--warn-soft);border:1px solid #fde68a;border-radius:8px;font-size:12px;color:var(--warn);text-align:center;font-weight:500}

@media(max-width:1000px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .stat-alle{display:none}
}
@media(max-width:900px){
  .stats{grid-template-columns:repeat(2,1fr);padding:12px 16px}
  .header{padding:12px 16px;flex-wrap:nowrap;gap:10px;align-items:center}
  .toolbar{padding-left:16px;padding-right:16px}
  .content{padding:12px 12px 60px}
  .search-wrap{max-width:none;margin-left:0;width:100%}
  .toolbar{gap:8px}
  .list{background:transparent;border:none;box-shadow:none}
  .list-header{display:none}
  .lead-row{display:block;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
  .card-view{display:block}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
  .card-name-block{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
  .card-name{font-weight:700;font-size:15px}
  .card-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim)}
  .card-headline{font-size:13px;color:var(--muted);margin:4px 0 10px;line-height:1.4}
  .card-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:11px}
  .card-meta-item{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#f1f5f9;border-radius:5px;color:var(--muted);font-family:'DM Mono',monospace}
  .header-left{flex:1;min-width:0;align-items:center}
  .header-right{gap:6px;flex-shrink:0;flex-wrap:nowrap}
  .logo{width:28px;height:28px;font-size:13px;flex-shrink:0}
  .title{font-size:15px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .subtitle{display:none}
  .refresh-btn{padding:6px 9px;font-size:11px}
  .sync-badge{padding:3px 8px;font-size:10px}
  .live-indicator{padding:4px 10px}
  .live-text{font-size:11px}
  .footer{padding:12px 16px;text-align:center}
  .panel{width:100%;max-width:100%}
  .overlay.open{display:block}
}
@media(max-width:560px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat{padding:10px}
  .stat-value{font-size:18px}
  .filter-btn{padding:6px 10px;font-size:11px}
  .panel-meta{grid-template-columns:1fr}
  .panel-header{padding:18px 16px 14px}
  .panel-body{padding:16px}
  .panel-actions{padding:14px 16px}
  .sync-badge{display:none}
  .refresh-btn{padding:6px 8px;font-size:0;width:34px;height:30px;position:relative}
  .refresh-btn::before{content:'↻';font-size:14px;color:var(--muted);position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .live-indicator{padding:4px 9px}
  .live-text{font-size:10px}
  .title{font-size:14px}
}
</style>
</head>
<body>
<div id="app"><div class="loader"><div class="spinner"></div></div></div>
<script>
var SHEET_ID = '1ptoQQS7TUpxJfK8GoNjrg2T0RB0msQpURiJA9W9sehw';
var SHEET_NAME = 'Leads';
var SYNC_URL = 'https://leadkamer.app.n8n.cloud/webhook/technetium-status';

var allData = [];
var statusFilter = 'Ter Review';
var searchQuery = '';
var syncState = 'off';
var busyKeys = {};
var selectedLead = null;

function normUrl(u){return String(u||'').toLowerCase().split('?')[0].replace(/\/$/,'').replace(/^https?:\/\//,'').replace(/^(www\.|nl\.|m\.)/,'').trim();}
function leadKey(l){return normUrl(l['Linkedin URL']||'');}
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}

function handleSheetData(data){
  try{
    var cols = data.table.cols.map(function(c){return c.label||''});
    var rows = data.table.rows;
    allData = rows.map(function(r){
      var o={};
      r.c.forEach(function(cell,i){
        if(!cols[i])return;
        var v = cell ? (cell.v==null?'':cell.v) : '';
        o[cols[i]] = (v instanceof Date) ? v.toISOString().slice(0,10) : String(v);
      });
      return o;
    }).filter(function(r){return r['Linkedin URL'] || r.Voornaam;});
    allData.sort(function(a,b){
      var da = (a.Datum||''), db = (b.Datum||'');
      return da < db ? 1 : da > db ? -1 : 0;
    });
    render();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="empty-state" style="padding:80px 20px"><h3>Fout bij laden</h3><p>'+esc(e.message)+'</p></div>';
  }
}

function loadData(){
  var old = document.getElementById('sheetLoader');
  if(old) old.remove();
  var s = document.createElement('script');
  s.id = 'sheetLoader';
  s.src = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=responseHandler:handleSheetData&sheet='+encodeURIComponent(SHEET_NAME)+'&_t='+Date.now();
  s.onerror = function(){
    document.getElementById('app').innerHTML='<div class="empty-state" style="padding:80px 20px"><h3>Kan data niet laden</h3><p>Zorg dat de sheet gedeeld is met &quot;Iedereen met de link&quot;.</p></div>';
  };
  document.body.appendChild(s);
}

function setStatus(lead, newStatus){
  var key = leadKey(lead);
  if(!key) return alert('Geen LinkedIn URL - kan status niet bijwerken.');
  if(!SYNC_URL){
    lead.Status = newStatus;
    render();
    alert('SYNC_URL niet geconfigureerd. Wijziging alleen lokaal.');
    return;
  }
  busyKeys[key] = true; render();
  var url = SYNC_URL+'?url='+encodeURIComponent(lead['Linkedin URL'])+'&status='+encodeURIComponent(newStatus)+'&_t='+Date.now();
  fetch(url).then(function(r){return r.json();}).then(function(d){
    busyKeys[key] = false;
    if(d && d.ok){
      lead.Status = newStatus;
      syncState = 'ok';
      if(selectedLead && leadKey(selectedLead) === key) selectedLead.Status = newStatus;
      render();
    } else {
      syncState = 'err'; render();
      alert('Fout: '+(d && d.error ? d.error : 'onbekend'));
    }
  }).catch(function(err){
    busyKeys[key] = false;
    syncState = 'err'; render();
    alert('Netwerkfout: '+err.message);
  });
}

function counts(){
  var c = {Nieuw:0, 'Ter Review':0, Verzenden:0, Afgewezen:0, Alle:allData.length};
  allData.forEach(function(l){ var s=(l.Status||'Nieuw').trim(); if(c[s]!=null) c[s]++; });
  return c;
}

function getFiltered(){
  var items = allData.slice();
  if(statusFilter !== 'Alle'){
    items = items.filter(function(l){ return (l.Status||'Nieuw').trim() === statusFilter; });
  }
  if(searchQuery){
    var q = searchQuery.toLowerCase();
    items = items.filter(function(l){
      return (l.Voornaam||'').toLowerCase().indexOf(q)>=0
        || (l.Achternaam||'').toLowerCase().indexOf(q)>=0
        || (l.Headline||'').toLowerCase().indexOf(q)>=0
        || (l.Locatie||'').toLowerCase().indexOf(q)>=0;
    });
  }
  return items;
}

function statusBadge(status){
  var s = (status||'Nieuw').trim();
  var cls = s==='Ter Review'?'st-review': s==='Verzenden'?'st-verzenden': s==='Afgewezen'?'st-afgewezen':'st-nieuw';
  var icon = s==='Ter Review'?'◐': s==='Verzenden'?'●': s==='Afgewezen'?'✗':'○';
  return '<span class="status-badge '+cls+'">'+icon+' '+esc(s)+'</span>';
}

function findLead(key){
  for(var i=0;i<allData.length;i++){ if(leadKey(allData[i]) === key) return allData[i]; }
  return null;
}
function openLead(key){ var l=findLead(key); if(l){ selectedLead = l; render(); } }
function closeLead(){ selectedLead = null; render(); }
function acceptLead(){ if(selectedLead) setStatus(selectedLead, 'Verzenden'); }
function rejectLead(){ if(selectedLead) setStatus(selectedLead, 'Afgewezen'); }
function resetLead(){ if(selectedLead) setStatus(selectedLead, 'Ter Review'); }
function setFilter(v){ statusFilter = v; render(); }
function setSearch(v){ searchQuery = v; render(); }

function renderPanel(lead){
  if(!lead) return '';
  var status = (lead.Status||'Nieuw').trim();
  var name = esc((lead.Voornaam||'') + ' ' + (lead.Achternaam||'')).trim() || '—';
  var functie = esc(lead.Functie || lead.Headline || '—');
  var bedrijf = lead.Bedrijf ? ' · ' + esc(lead.Bedrijf) : '';
  var key = leadKey(lead);
  var busy = busyKeys[key] ? 'busy' : '';

  var metaHtml = ''
    + '<div class="meta-item"><span class="meta-label">Status</span><span class="meta-value">'+statusBadge(lead.Status)+'</span></div>'
    + '<div class="meta-item"><span class="meta-label">Datum</span><span class="meta-value">'+esc(lead.Datum||'—')+'</span></div>'
    + '<div class="meta-item"><span class="meta-label">Locatie</span><span class="meta-value">'+esc(lead.Locatie||'—')+'</span></div>'
    + '<div class="meta-item"><span class="meta-label">Bron</span><span class="meta-value">'+esc(lead.Bron||'—')+'</span></div>'
    + (lead['AI Score'] ? '<div class="meta-item"><span class="meta-label">AI Score</span><span class="meta-value">'+esc(lead['AI Score'])+' / 10</span></div>' : '')
    + (lead['Gekozen Haak'] ? '<div class="meta-item"><span class="meta-label">Gekozen haak</span><span class="meta-value">'+esc(lead['Gekozen Haak'])+'</span></div>' : '');

  var linkedinSection = lead['Linkedin URL']
    ? '<div class="panel-section"><a class="panel-link" href="'+esc(lead['Linkedin URL'])+'" target="_blank" rel="noopener">↗ Open LinkedIn profiel</a></div>'
    : '';

  function section(title, content, allowEmpty){
    if(!content && !allowEmpty) return '';
    var box = content ? '<div class="message-box">'+esc(content)+'</div>' : '<div class="message-box empty">— nog niet gegenereerd —</div>';
    return '<div class="panel-section"><div class="panel-section-title">'+title+'</div>'+box+'</div>';
  }

  var emailContent = '';
  if(lead['Email Onderwerp'] || lead['Email Body']){
    emailContent = (lead['Email Onderwerp'] ? '<strong>'+esc(lead['Email Onderwerp'])+'</strong>\n\n' : '') + esc(lead['Email Body']||'');
  }
  var emailSection = emailContent
    ? '<div class="panel-section"><div class="panel-section-title">Email</div><div class="message-box">'+emailContent+'</div></div>'
    : '';

  var messagesHtml = ''
    + section('Connectie notitie', lead['Connectie Notitie'], true)
    + section('Follow-up bericht 1', lead['Follow-up Bericht'], true)
    + section('Follow-up bericht 2 (nudge)', lead['Follow-up Bericht 2'], true)
    + emailSection
    + section('AI Redenering', lead['Redenering']||'', false)
    + section('Pijnpunt', lead['Pijnpunt']||'', false);

  var actionsHtml = '';
  if(status === 'Ter Review'){
    actionsHtml = '<div class="panel-actions two-btn '+busy+'">'
      + '<button class="btn btn-reject" onclick="rejectLead()">✗ Afwijzen</button>'
      + '<button class="btn btn-accept" onclick="acceptLead()">✓ Accepteer → Verzenden</button>'
      + '</div>';
  } else if(status === 'Verzenden' || status === 'Afgewezen'){
    actionsHtml = '<div class="panel-actions '+busy+'">'
      + '<button class="btn btn-reset" onclick="resetLead()">↺ Terug naar Ter Review</button>'
      + '</div>';
  } else {
    actionsHtml = '<div class="panel-actions"><div class="panel-note">⏳ Wacht op AI-berichtgeneratie voordat Jurgen kan reviewen</div></div>';
  }

  return '<div class="overlay open" onclick="closeLead()">'
    + '<div class="panel" onclick="event.stopPropagation()">'
    + '<div class="panel-header">'
    + '<div class="panel-title-block"><div class="panel-name">'+name+'</div><div class="panel-sub">'+functie+bedrijf+'</div></div>'
    + '<button class="close-btn" onclick="closeLead()">&#10005;</button>'
    + '</div>'
    + '<div class="panel-body">'
    + '<div class="panel-meta">'+metaHtml+'</div>'
    + linkedinSection
    + messagesHtml
    + '</div>'
    + actionsHtml
    + '</div>'
    + '</div>';
}

function render(){
  var filtered = getFiltered();
  var c = counts();
  var app = document.getElementById('app');

  var syncHtml = '';
  if(SYNC_URL){
    var scls = syncState==='ok'?'sync-ok':(syncState==='err'?'sync-err':'sync-off');
    var sico = syncState==='ok'?'●':(syncState==='err'?'!':'…');
    var slbl = syncState==='ok'?'Sync':(syncState==='err'?'Sync fout':'Gereed');
    syncHtml = '<span class="sync-badge '+scls+'">'+sico+' '+slbl+'</span>';
  }

  var header = '<div class="header">'
    + '<div class="header-left">'
    + '<div class="logo">T</div>'
    + '<div><h1 class="title">Technetium Leadgen</h1><p class="subtitle">Review kandidaten — accepteer of wijs af</p></div>'
    + '</div>'
    + '<div class="header-right">'
    + syncHtml
    + '<button class="refresh-btn" onclick="loadData()">↻ Ververs</button>'
    + '<div class="live-indicator"><span class="live-dot"></span><span class="live-text">'+allData.length+' leads</span></div>'
    + '</div>'
    + '</div>';

  var stats = '<div class="stats">'
    + '<div class="stat stat-nieuw"><div class="stat-label">Nieuw</div><div class="stat-value">'+c.Nieuw+'</div></div>'
    + '<div class="stat stat-review"><div class="stat-label">Ter Review</div><div class="stat-value">'+c['Ter Review']+'</div></div>'
    + '<div class="stat stat-verzenden"><div class="stat-label">Verzenden</div><div class="stat-value">'+c.Verzenden+'</div></div>'
    + '<div class="stat stat-afgewezen"><div class="stat-label">Afgewezen</div><div class="stat-value">'+c.Afgewezen+'</div></div>'
    + '<div class="stat stat-alle"><div class="stat-label">Totaal</div><div class="stat-value">'+c.Alle+'</div></div>'
    + '</div>';

  var filters = ['Ter Review','Verzenden','Afgewezen','Nieuw','Alle'];
  var filterHtml = filters.map(function(f){
    var active = statusFilter === f ? 'active' : '';
    return '<button class="filter-btn '+active+'" onclick="setFilter(\''+f+'\')">'+f+' <span class="count">'+(c[f]||0)+'</span></button>';
  }).join('');

  var toolbar = '<div class="toolbar">'
    + '<div class="filter-group">'+filterHtml+'</div>'
    + '<div class="search-wrap">'
    + '<svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'
    + '<input class="search-input" placeholder="Zoek op naam, headline, locatie..." value="'+esc(searchQuery)+'" oninput="setSearch(this.value)" />'
    + '</div>'
    + '</div>';

  var listHtml = '';
  if(filtered.length === 0){
    listHtml = '<div class="list"><div class="empty-state"><h3>Geen leads</h3><p>Geen resultaten voor filter &quot;'+esc(statusFilter)+'&quot;.</p></div></div>';
  } else {
    var rows = '';
    for(var i=0;i<filtered.length;i++){
      var lead = filtered[i];
      var name = esc((lead.Voornaam||'') + ' ' + (lead.Achternaam||'')).trim() || '—';
      var headline = esc(lead.Headline || lead.Functie || '');
      var city = esc(lead.Locatie || '—');
      var date = esc(lead.Datum || '');
      var status = statusBadge(lead.Status);
      var key = esc(leadKey(lead));

      rows += '<div class="lead-row" onclick="openLead(\''+key+'\')">'
        + '<div><span class="date-mono">'+date+'</span></div>'
        + '<div><div class="name">'+name+'</div></div>'
        + '<div><div class="headline">'+headline+'</div></div>'
        + '<div><span class="city">'+city+'</span></div>'
        + '<div>'+status+'</div>'
        + '<div class="arrow">›</div>'
        + '<div class="card-view">'
          + '<div class="card-top"><div class="card-name-block"><span class="card-name">'+name+'</span><span class="card-date">'+date+'</span></div>'+status+'</div>'
          + (headline?'<div class="card-headline">'+headline+'</div>':'')
          + '<div class="card-meta"><span class="card-meta-item">📍 '+city+'</span></div>'
        + '</div>'
        + '</div>';
    }
    listHtml = '<div class="list">'
      + '<div class="list-header">'
      + '<div>Datum</div><div>Naam</div><div>Headline</div><div>Locatie</div><div>Status</div><div></div>'
      + '</div>'
      + rows
      + '</div>';
  }

  app.innerHTML = header + stats + toolbar
    + '<div class="content">' + listHtml + '</div>'
    + '<div class="footer">'+filtered.length+' van '+allData.length+' weergegeven</div>'
    + renderPanel(selectedLead);
}

loadData();
setInterval(loadData, 2*60*1000);
</script>
</body>
</html>
